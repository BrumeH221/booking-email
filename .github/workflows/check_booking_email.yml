name: Check Booking Emails

on:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: booking-email-worker
  cancel-in-progress: false

jobs:
  check-booking-email:
    runs-on: ubuntu-latest

    env:
      RUN_MODE: cloud
      DB_BACKEND: supabase

      USE_LLM_API: "true"
      USE_LOCAL_MODELS: "false"
      LLM_PROVIDER: gemini

      GEMINI_MODEL: gemini-2.0-flash
      GEMINI_EMBED_MODEL: text-embedding-004

      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}

      BUSINESS_NAME: Booking Team
      MAX_EMAILS_PER_RUN: "20"
      DUPLICATE_SIMILARITY_THRESHOLD: "0.92"
      SHEETS_ENABLED: "false"

      GMAIL_SEARCH_QUERY: "is:unread -category:promotions -category:social -category:updates"

      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show project files
        run: |
          echo "Root files:"
          ls -la
          echo "Backend files:"
          ls -la backend
          echo "Deploy files:"
          ls -la deploy

      - name: Set up Python with pip cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "deploy/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r deploy/requirements.txt

      - name: Run booking email worker
        run: |
          python main.py
